name: Historical benchmarks

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Inspect only or execute the complete proof
        type: choice
        options: [inspect, check]
        default: inspect

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        case:
          - requests-file-wrapper
          - click-fish-completion
          - httpx-request-timeout
          - pydantic-generator-max-length
          - pytest-initial-conftest
          - axios-http-adapter-error
          - zod-default-map-set-clone
          - date-fns-chinese-month
          - vite-null-export-glob
          - vitest-inline-diff-config
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: node scripts/run-benchmark.mjs --case "${{ matrix.case }}" --mode "${{ inputs.mode }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: benchmark-${{ matrix.case }}-${{ inputs.mode }}
          path: benchmarks/results/*.json
