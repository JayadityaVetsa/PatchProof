name: PatchProof example

on:
  pull_request:

permissions:
  contents: read

jobs:
  patchproof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      # Public consumers should replace this local path with a full immutable PatchProof commit SHA.
      - uses: ./
        with:
          config: .patchproof.yml
