name: PatchProof example

on:
  pull_request:

permissions:
  contents: read

jobs:
  patchproof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      # Public consumers should replace this local path with a full immutable PatchProof commit SHA.
      - uses: ./
        with:
          config: .patchproof.yml
          fail-on: regression
