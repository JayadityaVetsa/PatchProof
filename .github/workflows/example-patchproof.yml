name: PatchProof example

on:
  pull_request:

permissions:
  contents: read

jobs:
  patchproof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      # Public consumers should replace this local path with a full immutable PatchProof commit SHA.
      - uses: ./
        with:
          config: .patchproof.yml
          fail-on: regression
