name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the verified CLI package to npm
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  release:
    environment: npm-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: npm install --global npm@11.5.1
      - run: pnpm release:verify
      - name: Verify release identity
        shell: bash
        run: |
          test "${GITHUB_REF}" = "refs/tags/v0.1.0-alpha.1"
          test "$(node -p "require('./version.json').version")" = "0.1.0-alpha.1"
          test "$(node -p "require('./packages/cli/package.json').version")" = "0.1.0-alpha.1"
      - name: Publish
        if: ${{ inputs.publish }}
        run: pnpm --filter @jayadityavetsa/patchproof publish --provenance --access public --tag alpha
      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: patchproof-release-artifacts
          path: |
            artifacts/*.tgz
            artifacts/SHA256SUMS
            artifacts/patchproof-sbom.cdx.json
